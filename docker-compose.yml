version: "3.9"

services:
  postgres:
    image: postgres:16
    container_name: smartdocs-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: smartdocs
    ports:
      - "5432:5432"
    volumes:
      - smartdocs_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d smartdocs"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build: .
    container_name: smartdocs-app
    restart: unless-stopped
    ports:
      - "5177:5177"
    environment:
      PORT: 5177
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/smartdocs
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  smartdocs_pgdata:
